<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShadowVision — X-ray Shipment Validation Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --ink:#0B1F17;
  --paper:#F6F8F4;
  --panel:#FFFFFF;
  --line:#DCE3D9;
  --forest:#1D6A3C;
  --forest-deep:#123F24;
  --lime:#8DC63F;
  --amber:#E8A33D;
  --red:#C4432E;
  --muted:#5B6B60;
  --mono:'IBM Plex Mono','SFMono-Regular',Consolas,monospace;
  --sans:'Inter','Segoe UI',sans-serif;
  --radius:10px;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);}
@font-face{font-family:'Inter';src:local('Inter');}
.app{display:flex;min-height:100vh;}

/* Sidebar */
.sidebar{width:230px;background:var(--forest-deep);color:#EAF3EC;flex-shrink:0;display:flex;flex-direction:column;padding:20px 0;}
.brand{padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,.12);}
.brand .mark{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--lime);text-transform:uppercase;}
.brand h1{font-size:18px;margin:4px 0 0;font-weight:700;letter-spacing:-.01em;}
.nav{margin-top:14px;display:flex;flex-direction:column;}
.nav button{all:unset;cursor:pointer;padding:12px 20px;font-size:13.5px;color:#CFE0D5;display:flex;align-items:center;gap:10px;border-left:3px solid transparent;}
.nav button .num{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.35);}
.nav button:hover{background:rgba(255,255,255,.05);color:#fff;}
.nav button.active{background:rgba(141,198,63,.12);border-left-color:var(--lime);color:#fff;font-weight:600;}
.sidebar-foot{margin-top:auto;padding:16px 20px;font-family:var(--mono);font-size:10.5px;color:rgba(255,255,255,.35);border-top:1px solid rgba(255,255,255,.12);}

/* Main */
.main{flex:1;padding:28px 34px;overflow-x:hidden;}
.pagehead{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
.pagehead .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--forest);}
.pagehead h2{margin:2px 0 0;font-size:24px;letter-spacing:-.01em;}
.pagehead p{margin:4px 0 0;color:var(--muted);font-size:13.5px;max-width:520px;}

.btn{all:unset;cursor:pointer;padding:9px 16px;border-radius:7px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--forest);color:#fff;}
.btn-primary:hover{background:var(--forest-deep);}
.btn-outline{border:1px solid var(--line);color:var(--ink);background:#fff;}
.btn-outline:hover{border-color:var(--forest);}
.btn-danger{background:#fdeceb;color:var(--red);}
.btn-danger:hover{background:#f8d9d6;}
.btn-ghost{color:var(--muted);}
.btn:disabled{opacity:.4;cursor:not-allowed;}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);}
.grid{display:grid;gap:16px;}
.stats-grid{grid-template-columns:repeat(auto-fit,minmax(170px,1fr));margin-bottom:22px;}
.stat{padding:16px 18px;position:relative;overflow:hidden;}
.stat .label{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
.stat .value{font-size:26px;font-weight:700;margin-top:6px;letter-spacing:-.02em;}
.stat .bar{position:absolute;left:0;bottom:0;height:3px;width:100%;background:var(--lime);}
.stat.warn .bar{background:var(--amber);}
.stat.bad .bar{background:var(--red);}

.section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--forest-deep);margin:0 0 12px;font-family:var(--mono);}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--line);}
td{padding:10px;border-bottom:1px solid var(--line);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600;}
.pill-ok{background:#E7F3E0;color:var(--forest);}
.pill-fraud{background:#FBE4E0;color:var(--red);}
.pill-doubt{background:#FCEFDC;color:#9A6417;}
.pill-pending{background:#EEF1EC;color:var(--muted);}

.tabbar{display:flex;gap:4px;margin-bottom:18px;border-bottom:1px solid var(--line);}
.tabbar button{all:unset;cursor:pointer;padding:9px 14px;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;}
.tabbar button.active{color:var(--forest-deep);border-color:var(--forest);}

.formrow{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.formrow label{font-size:12px;font-weight:600;color:var(--muted);}
.formrow input,.formrow select,.formrow textarea{padding:9px 11px;border:1px solid var(--line);border-radius:7px;font-size:13.5px;font-family:var(--sans);background:#fff;}
.formrow input:focus,.formrow select:focus,.formrow textarea:focus{outline:2px solid var(--lime);outline-offset:1px;border-color:var(--forest);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

.dropzone{border:2px dashed var(--line);border-radius:var(--radius);padding:26px;text-align:center;cursor:pointer;background:#FBFCFA;transition:.15s;}
.dropzone:hover,.dropzone.drag{border-color:var(--forest);background:#F0F6ED;}
.dropzone .icon{font-size:26px;}
.dropzone .hint{font-size:12px;color:var(--muted);margin-top:4px;}

.thumb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;margin-top:12px;}
.thumb{position:relative;border-radius:7px;overflow:hidden;border:1px solid var(--line);aspect-ratio:1;background:#eee;}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb .tag{position:absolute;bottom:0;left:0;right:0;font-size:9.5px;font-family:var(--mono);text-align:center;padding:2px 0;background:rgba(0,0,0,.55);color:#fff;}
.thumb .rm{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;}

.product-card{padding:14px;display:flex;flex-direction:column;gap:8px;}
.product-card .thumbs{display:flex;gap:6px;}
.product-card .thumbs img{width:38px;height:38px;object-fit:cover;border-radius:5px;border:1px solid var(--line);}
.product-card h4{margin:0;font-size:14.5px;}
.product-card .cat{font-family:var(--mono);font-size:10.5px;color:var(--forest);text-transform:uppercase;letter-spacing:.05em;}
.product-card .row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);}

.search-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.search-row input,.search-row select{padding:9px 12px;border:1px solid var(--line);border-radius:7px;font-size:13px;}
.search-row input{flex:1;min-width:200px;}

.result-banner{padding:20px;border-radius:var(--radius);display:flex;align-items:center;gap:18px;margin-bottom:18px;}
.result-banner .icon{font-size:34px;}
.result-banner.ok{background:#E7F3E0;border:1px solid #BFE0AA;}
.result-banner.fraud{background:#FBE4E0;border:1px solid #F0B7AC;}
.result-banner.doubt{background:#FCEFDC;border:1px solid #F0CE96;}
.result-banner .rtitle{font-size:19px;font-weight:700;}
.result-banner .rsub{font-size:12.5px;color:var(--muted);margin-top:2px;}

.match-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;}
.match-card{border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff;}
.match-card img{width:100%;height:110px;object-fit:cover;display:block;}
.match-card .mc-body{padding:8px 10px;}
.match-card .sim{font-family:var(--mono);font-weight:700;font-size:15px;}
.match-card .simlabel{font-size:10.5px;color:var(--muted);}
.simbar{height:4px;border-radius:3px;background:var(--line);margin-top:6px;overflow:hidden;}
.simbar span{display:block;height:100%;background:var(--forest);}

.compare-wrap{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;}
.compare-col{flex:1;min-width:220px;}
.compare-col img{width:100%;border-radius:9px;border:1px solid var(--line);}
.compare-col .cap{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:6px;text-align:center;}

.decision-row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}

.badge{font-family:var(--mono);font-size:10.5px;background:var(--forest);color:#fff;padding:2px 7px;border-radius:5px;}

.empty{padding:40px 20px;text-align:center;color:var(--muted);}
.empty .icon{font-size:30px;margin-bottom:8px;}

.audit-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:12.5px;}
.audit-item:last-child{border-bottom:none;}
.audit-item .t{font-family:var(--mono);color:var(--muted);white-space:nowrap;}

.slider-row{display:flex;align-items:center;gap:12px;}
.slider-row input[type=range]{flex:1;accent-color:var(--forest);}
.slider-row .sv{font-family:var(--mono);font-weight:700;width:44px;text-align:right;}

.stepper{display:flex;gap:0;margin-bottom:20px;}
.step{flex:1;padding:10px 0;text-align:center;font-size:12px;font-weight:600;color:var(--muted);border-bottom:3px solid var(--line);}
.step.done{color:var(--forest);border-color:var(--forest);}
.step.now{color:var(--forest-deep);border-color:var(--lime);}

.toast{position:fixed;bottom:22px;right:22px;background:var(--forest-deep);color:#fff;padding:12px 18px;border-radius:8px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:99;opacity:0;transform:translateY(8px);transition:.25s;}
.toast.show{opacity:1;transform:translateY(0);}

::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}

.chart-box{position:relative;height:240px;}
.two-panel{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;}
@media(max-width:900px){.two-panel{grid-template-columns:1fr;} .two-col{grid-template-columns:1fr;}}

.loading-note{font-size:12px;color:var(--muted);text-align:center;padding:20px;}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>
<script>
/* ============ STATE & STORAGE ============ */
const STORAGE_KEY = 'xray-portal-data-v1';
let DATA = {
  categories: [],
  products: [],
  images: [],       // {id, productId, url, hash, status:'Verified'|'Fraud', verifiedBy, verifiedDate, source}
  validations: [],   // {id, productId, uploadedImages:[{url,hash}], topMatches, prediction, confidence, avgSimilarity, timestamp, reviewDecision, reviewer, reviewDate}
  settings: { threshOriginal: 95, threshDoubtful: 80, modelVersion: 'v1.0-sim-ahash',
              awbLookupUrl: 'https://script.google.com/macros/s/AKfycbwXjHMW9SINLjvB2EAG6zuxfv2q942nQ-2Z8Hgh2j6hkE2_3C9rV6FybwX2YwmuwHCMnA/exec' },
  audit: []
};
let route = 'dashboard';
let VALIDATE_STATE = { categoryId: null, productId: null, uploads: [], result: null };
let LIB_FILTER = { q: '', cat: '' };

function uid(p){ return p + '_' + Math.random().toString(36).slice(2,9); }
function nowISO(){ return new Date().toISOString(); }
function fmtDate(iso){ const d = new Date(iso); return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) + ' ' + d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}); }

async function loadData(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value){ DATA = Object.assign(DATA, JSON.parse(res.value)); }
  }catch(e){ /* no data yet */ }
}
let saveTimer=null;
function saveData(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{ await window.storage.set(STORAGE_KEY, JSON.stringify(DATA), false); }
    catch(e){ console.error('save failed', e); toast('⚠ Could not save — storage error'); }
  }, 200);
}

function addAudit(action, details){
  DATA.audit.unshift({ id: uid('aud'), action, details, timestamp: nowISO() });
  DATA.audit = DATA.audit.slice(0, 200);
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 2600);
}

/* ============ PERCEPTUAL HASH (dHash, 64-bit) ============
   Real, working similarity algorithm: resize to 9x8 grayscale,
   compare adjacent pixel brightness to build a 64-bit fingerprint.
   Hamming distance between hashes -> similarity %. This stands in
   for the CLIP/ViT embedding + FAISS search described in the
   architecture doc — same workflow shape, lighter-weight model. */
function computeHash(img){
  return new Promise((resolve)=>{
    const w=9,h=8;
    const c = document.createElement('canvas');
    c.width=w; c.height=h;
    const ctx = c.getContext('2d');
    ctx.drawImage(img,0,0,w,h);
    const data = ctx.getImageData(0,0,w,h).data;
    const gray = [];
    for(let i=0;i<data.length;i+=4){
      gray.push(0.299*data[i]+0.587*data[i+1]+0.114*data[i+2]);
    }
    let hash='';
    for(let row=0; row<h; row++){
      for(let col=0; col<w-1; col++){
        const left = gray[row*w+col];
        const right = gray[row*w+col+1];
        hash += left > right ? '1':'0';
      }
    }
    resolve(hash);
  });
}
function hammingSim(h1,h2){
  if(!h1||!h2||h1.length!==h2.length) return 0;
  let diff=0;
  for(let i=0;i<h1.length;i++) if(h1[i]!==h2[i]) diff++;
  return Math.round(((h1.length-diff)/h1.length)*1000)/10;
}
function fileToImage(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>resolve({img, url: reader.result});
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ============ DERIVED STATS ============ */
function stats(){
  const totalImages = DATA.images.length;
  const fraudImages = DATA.images.filter(i=>i.status==='Fraud').length;
  const verifiedImages = DATA.images.filter(i=>i.status==='Verified').length;
  const pendingDoubtful = DATA.validations.filter(v=>v.prediction==='Doubtful' && !v.reviewDecision).length;
  const reviewed = DATA.validations.filter(v=>v.reviewDecision);
  const agree = reviewed.filter(v=> (v.reviewDecision==='Original'&&v.prediction==='Original Product') || (v.reviewDecision==='Fraud'&&v.prediction==='Fraud'));
  const accuracy = reviewed.length ? Math.round((agree.length/reviewed.length)*1000)/10 : null;
  return {
    totalProducts: DATA.products.length,
    totalCategories: DATA.categories.length,
    totalImages, fraudImages, verifiedImages, pendingDoubtful,
    accuracy, totalValidations: DATA.validations.length
  };
}

/* ============ RENDER SHELL ============ */
const PAGES = [
  {id:'dashboard', label:'Dashboard', num:'01'},
  {id:'library', label:'Library', num:'02'},
  {id:'validate', label:'Validate Shipment', num:'03'},
  {id:'reports', label:'Reports', num:'04'},
  {id:'admin', label:'Admin Panel', num:'05'},
];

function renderShell(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="sidebar">
      <div class="brand">
        <div class="mark">Shadowfax · Trust &amp; Safety</div>
        <h1>ShadowVision</h1>
      </div>
      <div class="nav">
        ${PAGES.map(p=>`<button data-route="${p.id}" class="${route===p.id?'active':''}"><span class="num">${p.num}</span> ${p.label}</button>`).join('')}
      </div>
      <div class="sidebar-foot">MODEL ${DATA.settings.modelVersion}<br>${DATA.images.length} library images indexed</div>
    </div>
    <div class="main" id="main"></div>
  `;
  app.querySelectorAll('.nav button').forEach(b=>{
    b.addEventListener('click', ()=>{ route = b.dataset.route; renderShell(); });
  });
  renderPage();
}

function renderPage(){
  const main = document.getElementById('main');
  if(route==='dashboard') return renderDashboard(main);
  if(route==='library') return renderLibrary(main);
  if(route==='validate') return renderValidate(main);
  if(route==='admin') return renderAdmin(main);
  if(route==='reports') return renderReports(main);
}

/* ============ DASHBOARD ============ */
function renderDashboard(main){
  const s = stats();
  const recent = DATA.validations.slice(0,6);
  main.innerHTML = `
    <div class="pagehead">
      <div>
        <div class="eyebrow">Overview</div>
        <h2>Dashboard</h2>
        <p>Live snapshot of the verified-image library and shipment validation activity.</p>
      </div>
    </div>
    <div class="grid stats-grid">
      <div class="card stat"><div class="label">Total Products</div><div class="value">${s.totalProducts}</div><div class="bar"></div></div>
      <div class="card stat"><div class="label">Categories</div><div class="value">${s.totalCategories}</div><div class="bar"></div></div>
      <div class="card stat"><div class="label">Verified Images</div><div class="value">${s.verifiedImages}</div><div class="bar"></div></div>
      <div class="card stat bad"><div class="label">Fraud Images</div><div class="value">${s.fraudImages}</div><div class="bar"></div></div>
      <div class="card stat warn"><div class="label">Pending Doubtful</div><div class="value">${s.pendingDoubtful}</div><div class="bar"></div></div>
      <div class="card stat"><div class="label">Model Accuracy</div><div class="value">${s.accuracy===null?'—':s.accuracy+'%'}</div><div class="bar"></div></div>
    </div>
    <div class="two-panel">
      <div class="card" style="padding:18px;">
        <div class="section-title">Recent Validations</div>
        ${recent.length ? `<table><thead><tr><th>Product</th><th>Prediction</th><th>Similarity</th><th>When</th></tr></thead><tbody>
          ${recent.map(v=>{
            const p = DATA.products.find(pp=>pp.id===v.productId);
            return `<tr><td>${p?p.name:'—'}</td><td>${predictionPill(v)}</td><td>${v.avgSimilarity}%</td><td>${fmtDate(v.timestamp)}</td></tr>`;
          }).join('')}
        </tbody></table>` : emptyState('No validations yet','Run your first shipment through the Validate tab.')}
      </div>
      <div class="card" style="padding:18px;">
        <div class="section-title">Quick Actions</div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <button class="btn btn-primary" onclick="route='validate';renderShell()">▷ Validate a shipment</button>
          <button class="btn btn-outline" onclick="route='library';renderShell()">+ Add product to library</button>
          <button class="btn btn-outline" onclick="route='admin';renderShell()">⚙ Configure thresholds</button>
        </div>
        <div class="section-title" style="margin-top:22px;">System</div>
        <div style="font-size:12.5px;color:var(--muted);line-height:1.7;">
          Threshold — Original: <b>${DATA.settings.threshOriginal}%</b><br>
          Threshold — Doubtful floor: <b>${DATA.settings.threshDoubtful}%</b><br>
          Similarity engine: <b>dHash + Hamming</b> (demo stand-in for CLIP/FAISS — see architecture notes)
        </div>
      </div>
    </div>
  `;
}

function predictionPill(v){
  if(v.reviewDecision) {
    const map = {Original:'pill-ok', Fraud:'pill-fraud', 'Needs Review':'pill-pending'};
    return `<span class="pill ${map[v.reviewDecision]}">${v.reviewDecision==='Original'?'✅':v.reviewDecision==='Fraud'?'❌':'🔎'} ${v.reviewDecision} (reviewed)</span>`;
  }
  if(v.prediction==='Original Product') return `<span class="pill pill-ok">✅ Original</span>`;
  if(v.prediction==='Fraud') return `<span class="pill pill-fraud">❌ Fraud</span>`;
  return `<span class="pill pill-doubt">⚠ Doubtful</span>`;
}

function emptyState(title, sub){
  return `<div class="empty"><div class="icon">◌</div><div style="font-weight:600;color:var(--ink);">${title}</div><div style="font-size:12.5px;margin-top:4px;">${sub}</div></div>`;
}

/* ============ LIBRARY ============ */
function renderLibrary(main){
  const filtered = DATA.products.filter(p=>{
    const matchQ = !LIB_FILTER.q || p.name.toLowerCase().includes(LIB_FILTER.q.toLowerCase());
    const matchC = !LIB_FILTER.cat || p.categoryId===LIB_FILTER.cat;
    return matchQ && matchC;
  });
  main.innerHTML = `
    <div class="pagehead">
      <div>
        <div class="eyebrow">Library Management</div>
        <h2>Verified Image Library</h2>
        <p>Products, categories, and manually verified X-ray images used as the ground truth for validation.</p>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-outline" id="btn-add-cat">+ Category</button>
        <button class="btn btn-primary" id="btn-add-prod">+ Product</button>
      </div>
    </div>
    <div class="search-row">
      <input type="text" placeholder="Search products…" id="lib-search" value="${LIB_FILTER.q}">
      <select id="lib-cat-filter">
        <option value="">All categories</option>
        ${DATA.categories.map(c=>`<option value="${c.id}" ${LIB_FILTER.cat===c.id?'selected':''}>${c.name}</option>`).join('')}
      </select>
    </div>
    <div id="lib-body"></div>
  `;
  document.getElementById('lib-search').addEventListener('input', e=>{ LIB_FILTER.q=e.target.value; renderPage(); });
  document.getElementById('lib-cat-filter').addEventListener('change', e=>{ LIB_FILTER.cat=e.target.value; renderPage(); });
  document.getElementById('btn-add-cat').addEventListener('click', openAddCategoryModal);
  document.getElementById('btn-add-prod').addEventListener('click', ()=>openAddProductModal());

  const body = document.getElementById('lib-body');
  if(!DATA.categories.length){
    body.innerHTML = emptyState('No categories yet', 'Start by adding a product category (e.g. Cosmetics, Electronics).');
    return;
  }
  if(!filtered.length){
    body.innerHTML = emptyState('No products found', 'Try a different search or add a new product.');
    return;
  }
  body.innerHTML = `<div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(230px,1fr));">
    ${filtered.map(p=>{
      const cat = DATA.categories.find(c=>c.id===p.categoryId);
      const imgs = DATA.images.filter(i=>i.productId===p.id);
      const fraud = imgs.filter(i=>i.status==='Fraud').length;
      return `<div class="card product-card">
        <div class="row"><span class="cat">${cat?cat.name:'—'}</span><span>${imgs.length} imgs</span></div>
        <h4>${p.name} <span class="badge">#${p.code||'—'}</span></h4>
        <div class="thumbs">${imgs.slice(0,5).map(i=>`<img src="${i.url}" title="${i.status}">`).join('') || '<div style="font-size:11px;color:var(--muted);">No images yet</div>'}</div>
        <div class="row"><span>${fraud} fraud tagged</span><span>${imgs.length-fraud} verified</span></div>
        <div style="display:flex;gap:6px;margin-top:4px;">
          <button class="btn btn-outline" style="flex:1;padding:7px;font-size:12px;" onclick="openAddProductModal('${p.id}')">View / Edit</button>
          <button class="btn btn-danger" style="padding:7px 10px;font-size:12px;" onclick="deleteProduct('${p.id}')">Delete</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function openAddCategoryModal(){
  const name = prompt('New category name:');
  if(!name || !name.trim()) return;
  const cat = {id: uid('cat'), name: name.trim()};
  DATA.categories.push(cat);
  addAudit('Category added', name.trim());
  saveData(); toast('Category added: '+name); renderShell();
}

function deleteProduct(id){
  if(!confirm('Delete this product and all its library images? This cannot be undone.')) return;
  const p = DATA.products.find(pp=>pp.id===id);
  DATA.products = DATA.products.filter(pp=>pp.id!==id);
  DATA.images = DATA.images.filter(i=>i.productId!==id);
  addAudit('Product deleted', p?p.name:id);
  saveData(); toast('Product deleted'); renderShell();
}

function genProductCode(){
  // 6-digit pinned product code, unique against existing products
  let code;
  do { code = String(Math.floor(100000 + Math.random()*900000)); }
  while (DATA.products.some(p=>p.code===code));
  return code;
}

let MODAL_PRODUCT_ID = null;
function openAddProductModal(productId){
  MODAL_PRODUCT_ID = productId || null;
  const existing = productId ? DATA.products.find(p=>p.id===productId) : null;
  const overlay = document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(11,31,23,.45);display:flex;align-items:center;justify-content:center;z-index:80;';
  overlay.id='modal-overlay';
  const imgs = existing ? DATA.images.filter(i=>i.productId===existing.id) : [];
  overlay.innerHTML = `
    <div class="card" style="width:520px;max-width:92vw;max-height:88vh;overflow:auto;padding:22px;">
      <div class="section-title">${existing?'Edit Product':'Add Product'}</div>
      <div class="two-col">
        <div class="formrow">
          <label>Product name</label>
          <input type="text" id="m-name" value="${existing?existing.name:''}" placeholder="e.g. Lakmé Kajal 12ml">
        </div>
        <div class="formrow">
          <label>Product code</label>
          <input type="text" id="m-code" value="${existing?existing.code:genProductCode()}" placeholder="e.g. 403403">
        </div>
      </div>
      <div class="formrow">
        <label>Category</label>
        <select id="m-cat">
          ${DATA.categories.map(c=>`<option value="${c.id}" ${existing&&existing.categoryId===c.id?'selected':''}>${c.name}</option>`).join('')}
        </select>
      </div>
      <div class="formrow">
        <label>Upload verified X-ray images (multiple allowed)</label>
        <div class="dropzone" id="m-drop">
          <div class="icon">⇧</div>
          <div>Drag &amp; drop images, or click to browse</div>
          <div class="hint">Each upload is hashed and indexed for similarity search</div>
          <input type="file" id="m-file" accept="image/*" multiple style="display:none;">
        </div>
        <div class="thumb-grid" id="m-thumbs"></div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
        <button class="btn btn-ghost" id="m-cancel">Cancel</button>
        <button class="btn btn-primary" id="m-save">${existing?'Save changes':'Add product'}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  let pendingUploads = []; // {url, hash, status}
  function renderThumbs(){
    const box = document.getElementById('m-thumbs');
    const all = [...imgs.map(i=>({...i,_existing:true})), ...pendingUploads];
    box.innerHTML = all.map((im,idx)=>`
      <div class="thumb">
        <img src="${im.url}">
        <div class="tag">${im.status}</div>
        <button class="rm" data-idx="${idx}" data-existing="${im._existing?1:0}">×</button>
      </div>`).join('');
    box.querySelectorAll('.rm').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const idx = +btn.dataset.idx;
        if(btn.dataset.existing==='1'){
          const target = all[idx];
          DATA.images = DATA.images.filter(i=>i.id!==target.id);
          imgs.splice(imgs.findIndex(i=>i.id===target.id),1);
        } else {
          pendingUploads.splice(idx-imgs.length,1);
        }
        renderThumbs();
      });
    });
  }
  renderThumbs();

  async function handleFiles(fileList){
    for(const file of fileList){
      if(!file.type.startsWith('image/')) continue;
      const {img,url} = await fileToImage(file);
      const hash = await computeHash(img);
      pendingUploads.push({id: uid('img'), url, hash, status:'Verified', verifiedBy:'Nvd', verifiedDate: nowISO(), source:'library'});
    }
    renderThumbs();
  }
  const drop = document.getElementById('m-drop');
  const fileInput = document.getElementById('m-file');
  drop.addEventListener('click', ()=>fileInput.click());
  fileInput.addEventListener('change', e=>handleFiles(e.target.files));
  drop.addEventListener('dragover', e=>{e.preventDefault(); drop.classList.add('drag');});
  drop.addEventListener('dragleave', ()=>drop.classList.remove('drag'));
  drop.addEventListener('drop', e=>{e.preventDefault(); drop.classList.remove('drag'); handleFiles(e.dataTransfer.files);});

  document.getElementById('m-cancel').addEventListener('click', closeModal);
  document.getElementById('m-save').addEventListener('click', ()=>{
    const name = document.getElementById('m-name').value.trim();
    const code = document.getElementById('m-code').value.trim();
    const catId = document.getElementById('m-cat').value;
    if(!name){ toast('Product name is required'); return; }
    if(!code){ toast('Product code is required'); return; }
    if(!catId){ toast('Add a category first'); return; }
    const codeTaken = DATA.products.some(p=>p.code===code && p.id!==(existing&&existing.id));
    if(codeTaken){ toast('That product code is already in use'); return; }
    let prod = existing;
    if(!prod){
      prod = {id: uid('prod'), name, code, categoryId: catId, createdAt: nowISO()};
      DATA.products.push(prod);
      addAudit('Product added', `${name} (#${code})`);
    } else {
      prod.name = name; prod.code = code; prod.categoryId = catId;
      addAudit('Product edited', `${name} (#${code})`);
    }
    pendingUploads.forEach(u=>{ u.productId = prod.id; DATA.images.push(u); });
    if(pendingUploads.length) addAudit('Images uploaded to library', `${pendingUploads.length} image(s) → ${name}`);
    saveData(); toast('Saved: '+name); closeModal(); renderShell();
  });
  overlay.addEventListener('click', e=>{ if(e.target===overlay) closeModal(); });
}

function selectCategory(id){ VALIDATE_STATE = {categoryId:id, productId:null, uploads:[], result:null}; renderPage(); }
function selectProduct(id){ VALIDATE_STATE.productId = id; renderPage(); }
function resetValidation(){ VALIDATE_STATE = {categoryId:null, productId:null, uploads:[], result:null}; renderPage(); }

async function handleValUploads(fileList){
  for(const file of fileList){
    if(!file.type.startsWith('image/')) continue;
    const {img,url} = await fileToImage(file);
    const hash = await computeHash(img);
    VALIDATE_STATE.uploads.push({url, hash, name:file.name});
  }
  renderValThumbs();
}
function renderValThumbs(){
  const box = document.getElementById('v-thumbs');
  if(!box) return;
  box.innerHTML = VALIDATE_STATE.uploads.map((u,idx)=>`<div class="thumb"><img src="${u.url}"><button class="rm" data-idx="${idx}">×</button></div>`).join('');
  box.querySelectorAll('.rm').forEach(btn=>btn.addEventListener('click', ()=>{ VALIDATE_STATE.uploads.splice(+btn.dataset.idx,1); renderValThumbs(); document.getElementById('v-run').disabled = VALIDATE_STATE.uploads.length===0; }));
  const runBtn = document.getElementById('v-run');
  if(runBtn) runBtn.disabled = VALIDATE_STATE.uploads.length===0;
}

function runComparison(){
  const libImgs = DATA.images.filter(i=>i.productId===VALIDATE_STATE.productId);
  // For every uploaded image, find similarity against every library image of this product
  let allMatches = [];
  VALIDATE_STATE.uploads.forEach(u=>{
    libImgs.forEach(li=>{
      allMatches.push({ uploadedUrl:u.url, libImage: li, similarity: hammingSim(u.hash, li.hash) });
    });
  });
  allMatches.sort((a,b)=>b.similarity-a.similarity);
  const top5 = allMatches.slice(0,5);
  const bestPerUpload = VALIDATE_STATE.uploads.map(u=>{
    const matches = allMatches.filter(m=>m.uploadedUrl===u.url).sort((a,b)=>b.similarity-a.similarity);
    return matches[0] ? matches[0].similarity : 0;
  });
  const avgSimilarity = Math.round((bestPerUpload.reduce((a,b)=>a+b,0)/bestPerUpload.length)*10)/10;
  // check similarity against fraud-tagged images too (cross-product fraud signature check)
  const fraudLibAll = DATA.images.filter(i=>i.status==='Fraud');
  let fraudFlag = false, fraudSim = 0;
  VALIDATE_STATE.uploads.forEach(u=>{
    fraudLibAll.forEach(fi=>{
      const sim = hammingSim(u.hash, fi.hash);
      if(sim > fraudSim) fraudSim = sim;
      if(sim >= DATA.settings.threshOriginal) fraudFlag = true;
    });
  });

  let prediction, confidence;
  if(fraudFlag){
    prediction = 'Fraud'; confidence = fraudSim;
  } else if(avgSimilarity >= DATA.settings.threshOriginal){
    prediction = 'Original Product'; confidence = avgSimilarity;
  } else if(avgSimilarity >= DATA.settings.threshDoubtful){
    prediction = 'Doubtful'; confidence = avgSimilarity;
  } else {
    prediction = 'Fraud'; confidence = 100 - avgSimilarity;
  }

  const record = {
    id: uid('val'),
    productId: VALIDATE_STATE.productId,
    uploads: VALIDATE_STATE.uploads,
    topMatches: top5,
    prediction, confidence, avgSimilarity,
    timestamp: nowISO(),
    reviewDecision: null, reviewer: null, reviewDate: null
  };
  DATA.validations.unshift(record);
  addAudit('Validation run', `${prediction} — ${avgSimilarity}% avg similarity`);
  saveData();
  VALIDATE_STATE.result = record;
  renderPage();
}

  const bannerClass = v.prediction==='Original Product'?'ok':v.prediction==='Fraud'?'fraud':'doubt';
  const icon = v.prediction==='Original Product'?'✅':v.prediction==='Fraud'?'❌':'⚠️';
  body.innerHTML = `
    <div class="result-banner ${bannerClass}">
      <div class="icon">${icon}</div>
      <div>
        <div class="rtitle">${v.prediction}</div>

          </div>

      </div>` : emptyState('No library images to compare', '')}
    </div>
    ${v.prediction==='Doubtful' && !v.reviewDecision ? renderDoubtfulPanel(v) : ''}
    ${v.reviewDecision ? `<div class="card" style="padding:16px;background:#F7FAF5;"><b>Reviewed:</b> Marked as <b>${v.reviewDecision}</b> by ${v.reviewer} on ${fmtDate(v.reviewDate)}. ${v.reviewDecision!=='Needs Review' ? 'Uploaded image(s) added to the library for future training.' : ''}</div>` : ''}

function renderDoubtfulPanel(v){

    <div class="section-title">Doubtful — Human Review Required</div>
    <div class="compare-wrap">
      ${v.uploads.map(u=>`<div class="compare-col"><img src="${u.url}"><div class="cap">Uploaded — ${u.name||'shipment image'}</div></div>`).join('')}
      ${v.topMatches.slice(0,2).map(m=>`<div class="compare-col"><img src="${m.libImage.url}"><div class="cap">Library match · ${m.similarity}% · ${m.libImage.status}</div></div>`).join('')}
    </div>
    <div class="decision-row">
      <button class="btn btn-primary decision-btn" data-decision="Original">✅ Mark as Original</button>
      <button class="btn btn-danger decision-btn" data-decision="Fraud">❌ Mark as Fraud</button>

function reviewDecision(valId, decision){
  const v = DATA.validations.find(x=>x.id===valId);
  v.reviewDecision = decision; v.reviewer = 'Nvd'; v.reviewDate = nowISO();
  if(decision==='Original' || decision==='Fraud'){
    // continuous learning: add uploaded image(s) into the library, tagged
    v.uploads.forEach(u=>{
      DATA.images.push({
        id: uid('img'), productId: v.productId, url: u.url, hash: u.hash,
        status: decision==='Original' ? 'Verified' : 'Fraud',
        verifiedBy: 'Nvd', verifiedDate: nowISO(), source: 'validation-feedback'
      });
    });
    addAudit('Doubtful case reviewed', `${decision} — image(s) added to training library`);
  } else {
    addAudit('Doubtful case flagged for further review', v.id);
  }
  saveData();
  VALIDATE_STATE.result = v;
  toast('Decision saved — library updated');
  renderPage();
}

async function fetchByAwb(){
  const awb = document.getElementById('awb-input').value.trim();
  const status = document.getElementById('awb-fetch-status');
  const fallback = document.getElementById('awb-fallback');
  if(!awb){ status.textContent = 'Enter an AWB first.'; return; }
  if(!DATA.settings.awbLookupUrl){ status.textContent = 'No AWB lookup URL configured — set one in Admin.'; return; }
  status.textContent = 'Fetching from Drive…';
  fallback.style.display = 'none';
  try{
    const res = await fetch(DATA.settings.awbLookupUrl + '?awb=' + encodeURIComponent(awb));
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    await ingestAwbResponse(json, status);
  }catch(err){
    status.innerHTML = `<span style="color:var(--red);">Fetch failed (${err.message}) — most likely the browser blocking a cross-origin request to script.google.com. Use the paste-response fallback below.</span>`;
    fallback.style.display = 'block';
  }
}

function useAwbPaste(){
  const status = document.getElementById('awb-fetch-status');
  const raw = document.getElementById('awb-paste').value.trim();
  if(!raw){ status.textContent = 'Paste the JSON response first.'; return; }
  try{
    const json = JSON.parse(raw);
    ingestAwbResponse(json, status);
  }catch(err){
    status.innerHTML = `<span style="color:var(--red);">Could not parse that as JSON: ${err.message}</span>`;
  }
}

async function ingestAwbResponse(json, status){
  if(json.error){ status.innerHTML = `<span style="color:var(--red);">Endpoint error: ${json.error}</span>`; return; }
  if(!json.found){ status.innerHTML = `<span style="color:var(--amber);">No file found in Drive for AWB "${json.awb}".</span>`; return; }
  let added = 0;
  for(const m of json.matches){
    if(!m.base64){ continue; }
    const dataUrl = `data:${m.mimeType||'image/jpeg'};base64,${m.base64}`;
    const img = new Image();
    await new Promise((resolve,reject)=>{ img.onload=resolve; img.onerror=reject; img.src=dataUrl; });
    const hash = await computeHash(img);
    VALIDATE_STATE.uploads.push({url: dataUrl, hash, name: m.name});
    added++;
  }
  if(added===0){
    status.innerHTML = `<span style="color:var(--amber);">Found ${json.matches.length} match(es) but none included base64 image data — check the endpoint isn't using the urlOnly mode.</span>`;
    return;
  }
  status.innerHTML = `<span style="color:var(--forest);">✓ Pulled ${added} image(s) for AWB ${json.awb}.</span>`;
  renderValThumbs();
}

    <div class="two-panel">
      <div class="card" style="padding:18px;">
        <div class="section-title">Decision Thresholds</div>
        <div style="margin-bottom:18px;">
          <label style="font-size:12px;font-weight:600;color:var(--muted);">Original Product — minimum similarity</label>
          <div class="slider-row"><input type="range" min="80" max="100" id="th-orig" value="${DATA.settings.threshOriginal}"><span class="sv" id="th-orig-v">${DATA.settings.threshOriginal}%</span></div>
        </div>
        <div style="margin-bottom:10px;">
          <label style="font-size:12px;font-weight:600;color:var(--muted);">Doubtful — minimum similarity (below = Fraud)</label>
          <div class="slider-row"><input type="range" min="50" max="99" id="th-doubt" value="${DATA.settings.threshDoubtful}"><span class="sv" id="th-doubt-v">${DATA.settings.threshDoubtful}%</span></div>
        </div>
        <div style="font-size:12px;color:var(--muted);line-height:1.7;margin-top:10px;padding:10px 12px;background:#F7FAF5;border-radius:7px;">
          &gt; ${DATA.settings.threshOriginal}% → ✅ Original Product<br>
          ${DATA.settings.threshDoubtful}–${DATA.settings.threshOriginal}% → ⚠️ Doubtful<br>
          &lt; ${DATA.settings.threshDoubtful}% → ❌ Fraud
        </div>
        <button class="btn btn-primary" id="th-save" style="margin-top:14px;">Save thresholds</button>
      </div>
      <div class="card" style="padding:18px;">
        <div class="section-title">Model</div>
        <div style="font-size:13px;line-height:1.8;">
          Active version: <b>${DATA.settings.modelVersion}</b><br>
          Verified images indexed: <b>${DATA.images.length}</b><br>
          Human-reviewed feedback images: <b>${DATA.images.filter(i=>i.source==='validation-feedback').length}</b>
        </div>
        <button class="btn btn-outline" style="margin-top:14px;" id="btn-retrain">↻ Retrain / Re-index model</button>
        <div id="retrain-note" style="font-size:11.5px;color:var(--muted);margin-top:8px;"></div>
        <div class="section-title" style="margin-top:22px;">AWB Lookup Web App</div>
        <div class="formrow">
          <label>Apps Script Web App URL (doGet, ?awb=)</label>
          <input type="text" id="awb-url" value="${DATA.settings.awbLookupUrl||''}" placeholder="https://script.google.com/macros/s/.../exec">
        </div>
        <button class="btn btn-outline" id="awb-url-save">Save URL</button>
        <div style="font-size:11.5px;color:var(--muted);margin-top:8px;">Used by the "Fetch by AWB" option in the Validate step.</div>
      </div>
    </div>
    <div class="card" style="padding:18px;margin-top:18px;">
      <div class="section-title">Audit Log</div>
      ${DATA.audit.length ? DATA.audit.slice(0,30).map(a=>`<div class="audit-item"><span class="t">${fmtDate(a.timestamp)}</span><span><b>${a.action}</b> — ${a.details||''}</span></div>`).join('') : emptyState('No activity yet','')}
    </div>
  `;
  const orig = document.getElementById('th-orig'), doubt = document.getElementById('th-doubt');
  orig.addEventListener('input', ()=>{ document.getElementById('th-orig-v').textContent = orig.value+'%'; });
  doubt.addEventListener('input', ()=>{ document.getElementById('th-doubt-v').textContent = doubt.value+'%'; });
  document.getElementById('th-save').addEventListener('click', ()=>{
    const o = +orig.value, d = +doubt.value;
    if(d >= o){ toast('Doubtful floor must be below Original threshold'); return; }
    DATA.settings.threshOriginal = o; DATA.settings.threshDoubtful = d;
    addAudit('Thresholds updated', `Original ≥${o}%, Doubtful ≥${d}%`);
    saveData(); toast('Thresholds saved'); renderPage();
  });
  document.getElementById('btn-retrain').addEventListener('click', ()=>{
    const note = document.getElementById('retrain-note');
    note.textContent = 'Re-indexing embeddings for '+DATA.images.length+' images…';
    setTimeout(()=>{
      DATA.settings.modelVersion = 'v1.' + (parseInt(DATA.settings.modelVersion.split('.')[1])+1) + '-sim-ahash';
      addAudit('Model re-indexed', DATA.settings.modelVersion);
      saveData(); toast('Re-index complete: '+DATA.settings.modelVersion); renderPage();
    }, 900);
  });
  document.getElementById('awb-url-save').addEventListener('click', ()=>{
    DATA.settings.awbLookupUrl = document.getElementById('awb-url').value.trim();
    addAudit('AWB lookup URL updated', DATA.settings.awbLookupUrl);
    saveData(); toast('Saved AWB lookup URL');
  });
}

/* ============ REPORTS ============ */
let chartRefs = {};
function renderReports(main){
  const s = stats();
  const total = DATA.validations.length;
  const originals = DATA.validations.filter(v=>v.reviewDecision==='Original' || (!v.reviewDecision && v.prediction==='Original Product')).length;
  const frauds = DATA.validations.filter(v=>v.reviewDecision==='Fraud' || (!v.reviewDecision && v.prediction==='Fraud')).length;
  const doubtful = DATA.validations.filter(v=>v.prediction==='Doubtful' && !v.reviewDecision).length;
  const overrides = DATA.validations.filter(v=>v.reviewDecision && ((v.reviewDecision==='Original')!==(v.prediction==='Original Product'))).length;

  // category-wise fraud %
  const catStats = DATA.categories.map(c=>{
    const prodIds = DATA.products.filter(p=>p.categoryId===c.id).map(p=>p.id);
    const vals = DATA.validations.filter(v=>prodIds.includes(v.productId));
    const fr = vals.filter(v=>(v.reviewDecision||v.prediction)==='Fraud'||v.reviewDecision==='Fraud').length;
    return {name:c.name, total:vals.length, fraudPct: vals.length? Math.round((fr/vals.length)*1000)/10 : 0};
  });

  main.innerHTML = `
    <div class="pagehead">
      <div><div class="eyebrow">Analytics</div><h2>Reports</h2>
      <p>Validation volume, fraud trends, and model performance across the library.</p></div>
      <button class="btn btn-outline" id="btn-export">⬇ Export CSV</button>
    </div>
    <div class="grid stats-grid">
      <div class="card stat"><div class="label">Total Validations</div><div class="value">${total}</div><div class="bar"></div></div>
      <div class="card stat"><div class="label">Original Detected</div><div class="value">${originals}</div><div class="bar"></div></div>
      <div class="card stat bad"><div class="label">Fraud Detected</div><div class="value">${frauds}</div><div class="bar"></div></div>
      <div class="card stat warn"><div class="label">Doubtful (open)</div><div class="value">${doubtful}</div><div class="bar"></div></div>
      <div class="card stat"><div class="label">Human Overrides</div><div class="value">${overrides}</div><div class="bar"></div></div>
      <div class="card stat"><div class="label">Accuracy</div><div class="value">${s.accuracy===null?'—':s.accuracy+'%'}</div><div class="bar"></div></div>
    </div>
    <div class="two-panel">
      <div class="card" style="padding:18px;">
        <div class="section-title">Validation Outcomes</div>
        <div class="chart-box"><canvas id="chart-outcomes"></canvas></div>
      </div>
      <div class="card" style="padding:18px;">
        <div class="section-title">Category-wise Fraud %</div>
        ${catStats.length ? `<div class="chart-box"><canvas id="chart-cat"></canvas></div>` : emptyState('No category data yet','')}
      </div>
    </div>
    <div class="card" style="padding:18px;margin-top:18px;">
      <div class="section-title">All Validation Records</div>
      ${DATA.validations.length ? `<table><thead><tr><th>Product</th><th>Prediction</th><th>Avg Sim</th><th>Reviewed</th><th>When</th></tr></thead><tbody>
        ${DATA.validations.map(v=>{
          const p = DATA.products.find(pp=>pp.id===v.productId);
          return `<tr><td>${p?p.name:'—'}</td><td>${predictionPill(v)}</td><td>${v.avgSimilarity}%</td><td>${v.reviewer||'—'}</td><td>${fmtDate(v.timestamp)}</td></tr>`;
        }).join('')}
      </tbody></table>` : emptyState('No validations yet','')}
    </div>
  `;
  if(chartRefs.outcomes) chartRefs.outcomes.destroy();
  chartRefs.outcomes = new Chart(document.getElementById('chart-outcomes'), {
    type:'doughnut',
    data:{ labels:['Original','Fraud','Doubtful (open)'], datasets:[{data:[originals,frauds,doubtful], backgroundColor:['#1D6A3C','#C4432E','#E8A33D'], borderWidth:0}]},
    options:{plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:11}}}}, maintainAspectRatio:false}
  });
  if(catStats.length){
    if(chartRefs.cat) chartRefs.cat.destroy();
    chartRefs.cat = new Chart(document.getElementById('chart-cat'), {
      type:'bar',
      data:{ labels:catStats.map(c=>c.name), datasets:[{label:'Fraud %', data:catStats.map(c=>c.fraudPct), backgroundColor:'#C4432E', borderRadius:4}]},
      options:{ maintainAspectRatio:false, scales:{y:{beginAtZero:true,max:100}}, plugins:{legend:{display:false}} }
    });
  }
  document.getElementById('btn-export').addEventListener('click', exportCSV);
}

function exportCSV(){
  const rows = [['Product','Category','Prediction','AvgSimilarity','ReviewDecision','Reviewer','Timestamp']];
  DATA.validations.forEach(v=>{
    const p = DATA.products.find(pp=>pp.id===v.productId);
    const c = p ? DATA.categories.find(cc=>cc.id===p.categoryId) : null;
    rows.push([p?p.name:'', c?c.name:'', v.prediction, v.avgSimilarity, v.reviewDecision||'', v.reviewer||'', v.timestamp]);
  });
  const csv = rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='shadowvision-validations.csv'; a.click();
  URL.revokeObjectURL(url);
}

/* ============ INIT ============ */
(async function init(){
  document.getElementById('app').innerHTML = '<div class="loading-note" style="width:100%;padding:60px;">Loading ShadowVision…</div>';
  await loadData();
  renderShell();
})();
</script>
</body>
